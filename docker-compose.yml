version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kbeauty_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: kbeauty_market
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "10002:5432"
    networks:
      - kbeauty_network

  redis:
    image: redis:7-alpine
    container_name: kbeauty_redis
    restart: unless-stopped
    ports:
      - "10003:6379"
    volumes:
      - redis_data:/data
    networks:
      - kbeauty_network

  adminer:
    image: adminer:latest
    container_name: kbeauty_adminer
    restart: unless-stopped
    ports:
      - "10008:8080"
    depends_on:
      - postgres
    networks:
      - kbeauty_network

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: kbeauty_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "10009:9000"
      - "10010:9001"
    command: server /data --console-address ":9001"
    networks:
      - kbeauty_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  kbeauty_network:
    driver: bridge 