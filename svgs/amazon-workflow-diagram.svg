<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .process-box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
      .workflow-box { fill: #f1f8e9; stroke: #689f38; stroke-width: 2; }
      .market-box { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
     refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" class="title" style="font-size: 18px;">🌍 Amazon 통합 워크플로우</text>
  
  <!-- 상품 생성 그룹 -->
  <rect x="50" y="60" width="700" height="80" fill="none" stroke="#ddd" stroke-dasharray="5,5" />
  <text x="400" y="80" class="title">상품 생성</text>
  
  <rect x="70" y="90" width="120" height="40" class="process-box" />
  <text x="130" y="115" class="text">상품 등록</text>
  
  <rect x="220" y="90" width="150" height="40" class="process-box" />
  <text x="295" y="105" class="text">product-created</text>
  <text x="295" y="120" class="text">훅 실행</text>
  
  <rect x="400" y="90" width="180" height="40" class="process-box" />
  <text x="490" y="105" class="text">Amazon 동기화</text>
  <text x="490" y="120" class="text">워크플로우 시작</text>
  
  <!-- Amazon 동기화 프로세스 그룹 -->
  <rect x="50" y="160" width="700" height="80" fill="none" stroke="#ddd" stroke-dasharray="5,5" />
  <text x="400" y="180" class="title">Amazon 동기화 프로세스</text>
  
  <rect x="70" y="190" width="150" height="40" class="process-box" />
  <text x="145" y="205" class="text">prepareMarketplacesStep</text>
  <text x="145" y="220" class="text">마켓플레이스 검증</text>
  
  <rect x="250" y="190" width="150" height="40" class="process-box" />
  <text x="325" y="205" class="text">createSyncRecordsStep</text>
  <text x="325" y="220" class="text">동기화 레코드 생성</text>
  
  <rect x="430" y="190" width="150" height="40" class="process-box" />
  <text x="505" y="205" class="text">submitToAmazonStep</text>
  <text x="505" y="220" class="text">Amazon API 제출</text>
  
  <!-- 병렬 동기화 그룹 -->
  <rect x="50" y="260" width="700" height="80" fill="none" stroke="#ddd" stroke-dasharray="5,5" />
  <text x="400" y="280" class="title">병렬 동기화</text>
  
  <rect x="80" y="290" width="180" height="40" class="workflow-box" />
  <text x="170" y="305" class="text">amazonSyncProductWorkflow</text>
  <text x="170" y="320" class="text">상품 정보 동기화</text>
  
  <rect x="290" y="290" width="180" height="40" class="workflow-box" />
  <text x="380" y="305" class="text">amazonSyncInventoryWorkflow</text>
  <text x="380" y="320" class="text">재고 동기화</text>
  
  <rect x="500" y="290" width="180" height="40" class="workflow-box" />
  <text x="590" y="305" class="text">amazonSyncPriceWorkflow</text>
  <text x="590" y="320" class="text">가격 동기화</text>
  
  <!-- 10개국 마켓플레이스 그룹 -->
  <rect x="50" y="360" width="700" height="120" fill="none" stroke="#ddd" stroke-dasharray="5,5" />
  <text x="400" y="380" class="title">10개국 마켓플레이스</text>
  
  <rect x="70" y="390" width="100" height="35" class="market-box" />
  <text x="120" y="412" class="text">🇺🇸 Amazon US</text>
  
  <rect x="180" y="390" width="100" height="35" class="market-box" />
  <text x="230" y="412" class="text">🇯🇵 Amazon Japan</text>
  
  <rect x="290" y="390" width="100" height="35" class="market-box" />
  <text x="340" y="412" class="text">🇩🇪 Amazon Germany</text>
  
  <rect x="400" y="390" width="100" height="35" class="market-box" />
  <text x="450" y="412" class="text">🇬🇧 Amazon UK</text>
  
  <rect x="510" y="390" width="100" height="35" class="market-box" />
  <text x="560" y="412" class="text">🇫🇷 Amazon France</text>
  
  <rect x="620" y="390" width="100" height="35" class="market-box" />
  <text x="670" y="412" class="text">기타 6개국...</text>
  
  <!-- 화살표들 -->
  <!-- 상품 생성 흐름 -->
  <line x1="190" y1="110" x2="220" y2="110" class="arrow" />
  <line x1="370" y1="110" x2="400" y2="110" class="arrow" />
  
  <!-- 동기화 프로세스 흐름 -->
  <line x1="490" y1="130" x2="490" y2="160" class="arrow" />
  <line x1="490" y1="160" x2="145" y2="160" class="arrow" />
  <line x1="145" y1="160" x2="145" y2="190" class="arrow" />
  <line x1="220" y1="210" x2="250" y2="210" class="arrow" />
  <line x1="400" y1="210" x2="430" y2="210" class="arrow" />
  
  <!-- 병렬 동기화로 -->
  <line x1="505" y1="230" x2="505" y2="260" class="arrow" />
  <line x1="505" y1="260" x2="170" y2="260" class="arrow" />
  <line x1="170" y1="260" x2="170" y2="290" class="arrow" />
  <line x1="505" y1="260" x2="380" y2="260" class="arrow" />
  <line x1="380" y1="260" x2="380" y2="290" class="arrow" />
  <line x1="505" y1="260" x2="590" y2="260" class="arrow" />
  <line x1="590" y1="260" x2="590" y2="290" class="arrow" />
  
  <!-- 마켓플레이스로 -->
  <line x1="170" y1="330" x2="170" y2="360" class="arrow" />
  <line x1="380" y1="330" x2="380" y2="360" class="arrow" />
  <line x1="590" y1="330" x2="590" y2="360" class="arrow" />
  
  <!-- 각 워크플로우에서 마켓플레이스들로 -->
  <line x1="170" y1="360" x2="120" y2="390" class="arrow" stroke-dasharray="3,3" />
  <line x1="170" y1="360" x2="230" y2="390" class="arrow" stroke-dasharray="3,3" />
  <line x1="380" y1="360" x2="340" y2="390" class="arrow" stroke-dasharray="3,3" />
  <line x1="380" y1="360" x2="450" y2="390" class="arrow" stroke-dasharray="3,3" />
  <line x1="590" y1="360" x2="560" y2="390" class="arrow" stroke-dasharray="3,3" />
  <line x1="590" y1="360" x2="670" y2="390" class="arrow" stroke-dasharray="3,3" />
  
  <!-- 단계 표시 -->
  <circle cx="30" cy="110" r="15" fill="#1976d2" />
  <text x="30" y="115" class="text" fill="white">1</text>
  
  <circle cx="30" cy="210" r="15" fill="#1976d2" />
  <text x="30" y="215" class="text" fill="white">2</text>
  
  <circle cx="30" cy="310" r="15" fill="#689f38" />
  <text x="30" y="315" class="text" fill="white">3</text>
  
  <circle cx="30" cy="407" r="15" fill="#f57c00" />
  <text x="30" y="412" class="text" fill="white">4</text>
  
  <!-- 범례 -->
  <text x="400" y="520" class="title">워크플로우 실행 순서</text>
  <text x="400" y="540" class="text">1. 상품 등록 → 2. 동기화 프로세스 → 3. 병렬 동기화 → 4. 마켓플레이스 업데이트</text>
  <text x="400" y="560" class="text">각 워크플로우는 10개국 Amazon 마켓플레이스에 동시 동기화됩니다</text>
</svg>